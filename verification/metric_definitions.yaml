schema_version: 0.2.0
metrics:
- id: COMPUTE_SUMMARY
  file_patterns:
  - '**/compute_summary.csv'
  required_columns:
  - model_seed
  - method
  - total_forward_images
  - total_optimizer_steps
- id: GATE_SUMMARY
  file_patterns:
  - '**/gate_summary.csv'
  required_columns:
  - gate
  - passed
  - status
- id: AGGREGATE_SEED_EFFECTS
  file_patterns:
  - '**/aggregate_seed_effects.csv'
  required_columns:
  - contrast
  - partition
  - geometry
  - metric
  - seed_ci_low
  - seed_ci_high
- id: AGGREGATE_METHOD_SUMMARY
  file_patterns:
  - '**/aggregate_method_summary.csv'
  required_columns:
  - method
  - metric
  - mean
- id: CAUSAL_SEED_SUMMARY
  file_patterns:
  - '**/causal_seed_summary.csv'
  required_columns:
  - model_seed
  - method
- id: HOST_OR_ALLOCATION_ABLATION
  file_patterns:
  - '**/host_ablation.csv'
  - '**/route_swap_effects.csv'
  required_columns: []
- id: RUN_MANIFEST_METRIC
  file_patterns:
  - '**/run_manifest.json'
  required_keys:
  - notebook_version
  - build_revision
  - model_seeds
  - split_manifest
- id: CLAIM_MANIFEST_METRIC
  file_patterns:
  - '**/claim_manifest.json'
  required_keys:
  - version
  - status
  - non_claims
